spring.application.name=BANKING

# ---- Datasource (MySQL) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bank_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Asdfghjkl12345}

# ---- Connection pool (Hikari) ----
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Logging ----
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%X{traceId}] %-5level %logger - %msg%n

# ---- Mail (uncomment when ready) ----
# spring.mail.host=${MAIL_HOST:smtp.gmail.com}
# spring.mail.port=${MAIL_PORT:587}
# spring.mail.username=${MAIL_USERNAME:}
# spring.mail.password=${MAIL_PASSWORD:}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================================================
# PHASE 1: Redis Distributed Caching
# ==============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.cache.type=redis
app.cache.default-ttl-minutes=10

# ==============================================================
# PHASE 2: Kafka Event-Driven Architecture
# ==============================================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=trustbank-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.bank.event

# ==============================================================
# PHASE 3: Resilience4j Circuit Breakers & Retries
# ==============================================================
# Circuit breaker for Kafka producer
resilience4j.circuitbreaker.instances.kafkaProducer.slidingWindowSize=10
resilience4j.circuitbreaker.instances.kafkaProducer.failureRateThreshold=50
resilience4j.circuitbreaker.instances.kafkaProducer.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.kafkaProducer.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.kafkaProducer.slidingWindowType=COUNT_BASED

# Retry for transient failures
resilience4j.retry.instances.kafkaRetry.maxAttempts=3
resilience4j.retry.instances.kafkaRetry.waitDuration=500ms
resilience4j.retry.instances.kafkaRetry.enableExponentialBackoff=true
resilience4j.retry.instances.kafkaRetry.exponentialBackoffMultiplier=2

# ==============================================================
# PHASE 4a: Actuator + Prometheus Metrics
# ==============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

# ==============================================================
# PHASE 4c: Distributed Tracing (OpenTelemetry -> Zipkin)
# ==============================================================
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:1.0}
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# ---- JWT ----
app.jwt.secret=${JWT_SECRET:this_is_a_local_development_secret_key_please_override_in_prod}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
