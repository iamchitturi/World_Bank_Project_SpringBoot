# MySQL profile - activate with: SPRING_PROFILES_ACTIVE=mysql
#
# Required env vars:
#   DB_URL      - defaults to localhost bank_db (add ?useSSL=false&allowPublicKeyRetrieval=true for local dev)
#   DB_USERNAME - MySQL username
#   DB_PASSWORD - MySQL password

# ---- Datasource ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bank_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ---- Connection pool (Hikari) ----
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

# ---- Disable H2 console (not applicable with MySQL) ----
spring.h2.console.enabled=false
