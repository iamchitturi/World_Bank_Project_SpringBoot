version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: bank-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: bank_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bank-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/bank_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-256-bit-key-here}
    depends_on:
      mysql:
        condition: service_healthy

  adminer:
    image: adminer
    container_name: bank-adminer
    ports:
      - "9090:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
