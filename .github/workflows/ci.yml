name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: bank_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make wrapper executable
        run: chmod +x mvnw

      - name: Run tests with coverage
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/bank_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          DB_USERNAME: root
          DB_PASSWORD: secret
          JWT_SECRET: ci-test-jwt-secret-key-only-used-for-automated-tests
        run: ./mvnw test jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

