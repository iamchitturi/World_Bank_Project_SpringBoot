input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [application] {
    mutate {
      add_field => { "[@metadata][target_index]" => "trustbank-%{+YYYY.MM.dd}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][target_index]}"
  }
  stdout {
    codec => rubydebug
  }
}
